<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0833" />
      <stop offset="100%" stop-color="#b5142e" />
    </linearGradient>
  </defs>
  
  <!-- Background: Deep dark circle with gradient border matching the site surface -->
  <circle cx="256" cy="256" r="230" fill="#0a0a0c" stroke="url(#redGradient)" stroke-width="14" />
  
  <!-- Left Bracket `<` -->
